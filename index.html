<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | ICRB Portal</title>

  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --border: #263247;
      --text: #ecf1ff;
      --muted: #9aa8c7;
      --accent: #5b8cff;
      font-family: Inter, Arial;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 20px;
    }

    .main {
      padding: 24px;
    }

    .card {
      background: var(--panel);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(91,140,255,0.2);
      font-size: 12px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .logout {
      background: #ff6b6b;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <h2>ICRB Portal</h2>
      <button id="logoutButton" class="logout">Logout</button>
    </aside>

    <main class="main">
      <div class="card">
        <h2>Welcome, <span id="dashboardUsername"></span></h2>
        <div id="dashboardRole"></div>
        <div id="dashboardCommittee"></div>
        <div id="dashboardAdminBadge" class="badge" hidden></div>
      </div>

      <div class="card">
        <h3>System Status</h3>
        <p class="muted">Secure dashboard loaded successfully.</p>
      </div>
    </main>
  </div>

  <script type="module">
    import { enforceDashboardAccess, populateDashboardIdentity, wireLogoutButton } from './js/layout/dashboard-guard.js';

    (async () => {
      const memberData = await enforceDashboardAccess();

      if (!memberData) return;

      populateDashboardIdentity(memberData);
      wireLogoutButton();
    })();
  </script>
</body>
</html>
