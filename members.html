<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members | ICRB Portal</title>
  <style>
    body {
      margin: 0;
      background: #0b1220;
      color: white;
      font-family: Inter, Arial;
      padding: 20px;
    }

    .member-card {
      border: 1px solid #263247;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      background: #121a2b;
    }
  </style>
</head>
<body>
  <h2>Members (Admin Only)</h2>
  <div id="membersList"></div>

  <script type="module">
    import { requireAdminPage } from './js/auth/permissions.js';
    import { loadMembers } from './js/pages/members.js';

    (async () => {
      const member = await requireAdminPage();
      if (!member) return;

      await loadMembers();
    })();
  </script>
</body>
</html>
