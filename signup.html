<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup | ICRB Portal</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1220;
      color: #ecf1ff;
      font-family: Inter, Arial;
    }

    .card {
      width: 420px;
      background: #121a2b;
      padding: 28px;
      border-radius: 14px;
      border: 1px solid #263247;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 8px;
      border: 1px solid #263247;
      background: transparent;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #5b8cff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Account</h2>

    <form id="signupForm">
      <input id="memberId" placeholder="Member ID" required />
      <input id="committeeId" placeholder="Committee ID" required />
      <input id="password" type="password" placeholder="Password" required />

      <button type="submit">Create Account</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script type="module">
    import { completeInstantSignup } from './js/auth/signup.js';

    const form = document.getElementById('signupForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const memberId = document.getElementById('memberId').value.trim();
      const committeeId = document.getElementById('committeeId').value.trim();
      const password = document.getElementById('password').value;

      status.textContent = 'Creating account...';

      try {
        await completeInstantSignup(memberId, committeeId, password);
        status.textContent = 'Account created. Redirecting to login...';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } catch (err) {
        status.textContent = err.message;
      }
    });
  </script>
</body>
</html>
